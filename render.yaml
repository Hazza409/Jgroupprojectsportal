# Render Blueprint — one-file deploy of the J Group dashboard.
# Provisions: the Next.js web service + a managed Postgres database + a
# persistent disk for uploaded files (photos, recon sheets, invoices, docs).
# See DEPLOYMENT.md for the click-by-click walkthrough.

databases:
  - name: jgroup-db
    databaseName: jgroup
    plan: free # free Postgres expires after 90 days — upgrade in the dashboard for production

services:
  - type: web
    name: jgroup-dashboard
    runtime: node
    plan: starter # paid (~$7/mo) — required for the persistent disk below
    # --include=dev forces build tools (prisma, typescript, tailwind, tsx) to
    # install even though Render runs in production mode — without this the
    # build fails with "prisma: not found" / "Please install typescript".
    buildCommand: npm install --include=dev && npm run build
    # Run DB migrations on every deploy, then start. NEXTAUTH_URL is taken from
    # the public URL Render assigns this service (no manual step needed).
    startCommand: npx prisma migrate deploy && NEXTAUTH_URL=$RENDER_EXTERNAL_URL npm run start
    healthCheckPath: /login
    disk:
      name: uploads
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jgroup-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true # Render generates a strong secret automatically
      - key: STORAGE_DRIVER
        value: local # uploads go to the persistent disk below
      - key: LOCAL_STORAGE_DIR
        value: /var/data
      - key: NODE_VERSION
        value: "20"
      - key: EMAIL_DRIVER
        value: console # set to "resend" + the keys below to send real emails
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      # Xero (optional, read-only sync) — leave blank unless connecting Xero:
      - key: XERO_CLIENT_ID
        sync: false
      - key: XERO_CLIENT_SECRET
        sync: false
      - key: XERO_REDIRECT_URI
        sync: false
